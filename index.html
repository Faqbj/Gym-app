<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GymLog"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0a'/%3E%3Cellipse cx='50' cy='50' rx='32' ry='10' fill='none' stroke='%23d4ff4e' stroke-width='7' stroke-linecap='round'/%3E%3Crect x='16' y='38' width='8' height='24' rx='4' fill='%23d4ff4e'/%3E%3Crect x='76' y='38' width='8' height='24' rx='4' fill='%23d4ff4e'/%3E%3Crect x='8' y='42' width='10' height='16' rx='3' fill='%23d4ff4e'/%3E%3Crect x='82' y='42' width='10' height='16' rx='3' fill='%23d4ff4e'/%3E%3C/svg%3E"/>
<title>GymLog</title>
<style>
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--card3:#242424;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.24);
  --t:#efefef;--m:#4a4a4a;--m2:#7a7a7a;
  --acc:#d4ff4e;--acc2:#a8cc2e;--acc-dim:rgba(212,255,78,0.08);
  --pierna:#4e9eff;--torso:#ff6b4e;--green:#4eff8b;--red:#ff5555;--amber:#ffb84e;
  --r:18px;--r2:13px;--r3:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{height:100%;height:-webkit-fill-available;min-height:100dvh;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;text-size-adjust:none;-webkit-text-size-adjust:none}
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;width:100%;height:100%;height:100dvh}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);will-change:transform;overflow:hidden}
.screen.slide-right{transform:translateX(100%);pointer-events:none}
.screen.slide-left{transform:translateX(-28%);opacity:.25;pointer-events:none}
.screen.animating{transition:transform .38s cubic-bezier(.25,.46,.45,.94),opacity .38s cubic-bezier(.25,.46,.45,.94)}
.scr-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(90px + env(safe-area-inset-bottom,34px))}
.topbar{padding:max(48px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 0;flex-shrink:0}
.app-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--m2);margin-bottom:5px}
.topbar h1{font-size:clamp(24px,7vw,32px);font-weight:700;letter-spacing:-.8px;line-height:1.1;margin-bottom:14px}
.topbar h1 em{font-style:normal;color:var(--acc)}
.back-row{display:flex;align-items:center;gap:7px;margin-bottom:14px;cursor:pointer;background:none;border:none;color:var(--m2);font-size:14px;font-weight:500;padding:0}
.cycle-row{display:flex;align-items:center;gap:8px;padding:0 20px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.cycle-row::-webkit-scrollbar{display:none}
.cycle-pill{flex-shrink:0;padding:7px 16px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--m2);transition:all .18s}
.cycle-pill.active{background:var(--acc);color:#0a0a0a;border-color:var(--acc)}
.cycle-new-btn{flex-shrink:0;padding:7px 14px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;border:1px dashed var(--b2);background:transparent;color:var(--m2);display:flex;align-items:center;gap:5px}
.cycle-new-btn:active{background:var(--b2)}
.week-pills{display:flex;gap:6px;overflow-x:auto;padding:0 20px 16px;flex-shrink:0;scrollbar-width:none}
.week-pills::-webkit-scrollbar{display:none}
.wpill{flex-shrink:0;padding:8px 20px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--m2);transition:all .18s}
.wpill.active{background:var(--acc);color:#0a0a0a;border-color:var(--acc)}
.day-card{border-radius:var(--r);margin:0 14px 10px;cursor:pointer;border:1px solid var(--b);background:var(--card);transition:transform .13s;position:relative;overflow:hidden;padding:16px 18px}
.day-card:active{transform:scale(.977)}
.day-card.done{border-color:rgba(212,255,78,.2)}
.type-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:9px}
.pill-pierna{background:rgba(78,158,255,.1);color:var(--pierna)}
.pill-torso{background:rgba(255,107,78,.1);color:var(--torso)}
.extra-pill{background:rgba(255,255,255,.06);color:var(--m2);border:1px solid var(--b2)}
.day-name{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.day-exlist{font-size:12px;color:var(--m2);margin-bottom:10px;line-height:1.65}
.day-prog{display:flex;align-items:center;gap:9px;margin-top:4px}
.pbar{flex:1;height:2px;background:var(--b2);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbar-label{font-size:11px;color:var(--m2);font-weight:500;min-width:28px;text-align:right}
.done-ck{position:absolute;top:16px;right:16px;width:24px;height:24px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;color:#0a0a0a;font-weight:800}
.chev{position:absolute;top:50%;right:18px;transform:translateY(-50%);font-size:22px;color:var(--m)}
.day-card.done .chev{display:none}
.add-day-btn{display:flex;align-items:center;gap:11px;margin:0 14px 10px;padding:14px 16px;background:transparent;border:1px dashed var(--b2);border-radius:var(--r);cursor:pointer;color:var(--m2);font-size:14px;font-weight:500;width:calc(100% - 28px);transition:background .15s}
.add-day-btn:active{background:var(--b)}
.add-day-icon{width:36px;height:36px;border-radius:10px;background:var(--b2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.name-day-wrap{margin:0 14px 10px;display:flex;align-items:center;gap:8px;width:calc(100% - 28px)}
.name-day-input{flex:1;background:var(--card2);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t);font-size:15px;padding:11px 13px;outline:none;font-family:inherit}
.name-day-input:focus{border-color:var(--b3)}
.name-day-ok{padding:11px 16px;background:var(--acc);color:#0a0a0a;border:none;border-radius:var(--r2);font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(10,10,10,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:0.5px solid var(--b2);padding-top:8px;padding-bottom:max(env(safe-area-inset-bottom,20px),20px);padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);z-index:100}
.nav-btn{flex:1;padding:2px 0 0;background:none;border:none;cursor:pointer;font-size:10px;color:var(--m);display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;transition:color .18s;-webkit-user-select:none;user-select:none}
.nav-btn svg{transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.nav-btn.active svg{transform:scale(1.15)}
.nav-btn:active svg{transform:scale(.82)}
.nav-btn.active{color:var(--acc)}
.tab-pane{display:none;flex-direction:column;flex:1;overflow:hidden}
.tab-pane.active{display:flex}
.day-screen-top{padding:max(48px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 0;flex-shrink:0}
.day-week-sub{font-size:12px;color:var(--m2);margin-bottom:16px}
.ex-swipe-wrap{position:relative;margin:0 14px 8px;border-radius:var(--r);overflow:hidden}
.ex-delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:var(--r);z-index:0}
.ex-delete-bg-icon{font-size:13px;font-weight:700;color:#fff}
.ex-list-card{border-radius:var(--r);cursor:pointer;border:1px solid var(--b);background:var(--card);transition:background .15s;position:relative;overflow:hidden;display:flex;align-items:center;padding:14px 14px;gap:13px;z-index:1;transform:translateX(0);will-change:transform}
.ex-list-card.ex-done{border-color:rgba(212,255,78,.16)}
.ex-list-card.dragging{opacity:.5}
.drag-handle{width:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex-shrink:0;cursor:grab;padding:4px 0;opacity:.3}
.drag-handle span{display:block;width:16px;height:1.5px;background:var(--t);border-radius:2px}
.ex-circle{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.circ-pierna{background:rgba(78,158,255,.1)}.circ-torso{background:rgba(255,107,78,.1)}.circ-extra{background:rgba(255,255,255,.06)}
.ex-list-info{flex:1;min-width:0}
.ex-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.ex-list-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.range-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.04);color:var(--m2);border:1px solid var(--b2);white-space:nowrap;flex-shrink:0}
.series-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(78,158,255,.07);color:var(--pierna);border:1px solid rgba(78,158,255,.12);white-space:nowrap;flex-shrink:0}
.ex-list-meta{font-size:12px;color:var(--m2)}
.ex-list-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sets-done-badge{font-size:10px;font-weight:700;background:rgba(212,255,78,.1);color:var(--acc);padding:2px 8px;border-radius:6px}
.ex-chev{font-size:20px;color:var(--m)}
.add-ex-btn{display:flex;align-items:center;gap:11px;margin:0 14px 8px;padding:14px 16px;background:var(--card);border:1px dashed var(--b2);border-radius:var(--r);cursor:pointer;color:var(--m2);font-size:14px;font-weight:500;width:calc(100% - 28px)}
.add-ex-btn:active{background:var(--card2)}
.add-ex-icon{width:36px;height:36px;border-radius:10px;background:var(--b2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.search-wrap{position:relative;margin:0 14px 8px;width:calc(100% - 28px)}
.search-input{width:100%;padding:14px 14px;background:var(--card2);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t);font-size:16px;outline:none}
.search-input::placeholder{color:var(--m)}
.search-input:focus{border-color:var(--b3)}
.suggestions{background:var(--card2);border:1px solid var(--b2);border-radius:var(--r2);overflow:hidden;margin-top:4px}
.sugg-item{padding:13px 14px;cursor:pointer;font-size:15px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;color:var(--t)}
.sugg-item:last-child{border-bottom:none}
.sugg-item:active{background:var(--card3)}
.sugg-plus{font-size:15px;color:var(--m)}
.notes-wrap{margin:0 14px 8px;width:calc(100% - 28px)}
.notes-input{width:100%;padding:13px 14px;background:var(--card);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t);font-size:14px;outline:none;resize:none;min-height:72px;font-family:inherit;line-height:1.6}
.notes-input::placeholder{color:var(--m)}
.notes-input:focus{border-color:var(--b3)}
.notes-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--m2);margin-bottom:6px;display:block}
.save-session-btn{margin:4px 14px 8px;width:calc(100% - 28px);padding:16px;background:var(--acc);color:#0a0a0a;border:none;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;display:block;text-align:center;transition:transform .1s}
.save-session-btn:active{transform:scale(.97)}
.save-session-btn.saved{background:#192200;color:var(--acc)}

/* SAVE CELEBRATION OVERLAY */
.save-overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.save-overlay.show{animation:overlayFade .9s ease forwards}
@keyframes overlayFade{0%{opacity:0}15%{opacity:1}70%{opacity:1}100%{opacity:0}}
.save-circle{width:100px;height:100px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;transform:scale(0);animation:none}
.save-overlay.show .save-circle{animation:circlePop .4s cubic-bezier(.34,1.56,.64,1) .05s forwards}
@keyframes circlePop{0%{transform:scale(0)}100%{transform:scale(1)}}
.save-check{font-size:48px;line-height:1;color:#0a0a0a}
.save-text{margin-top:16px;font-size:17px;font-weight:700;color:var(--t);letter-spacing:-.3px;opacity:0;transform:translateY(8px)}
.save-overlay.show .save-text{animation:textUp .35s ease .2s forwards}
@keyframes textUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.save-sub{font-size:13px;color:var(--m2);margin-top:4px;opacity:0}
.save-overlay.show .save-sub{animation:textUp .35s ease .3s forwards}

/* CONFIRMATION SHEET */
.confirm-sheet{position:fixed;inset:0;z-index:998;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s}
.confirm-sheet.open{background:rgba(0,0,0,.5);pointer-events:all}
.confirm-body{background:var(--card2);border-radius:var(--r) var(--r) 0 0;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 16px);transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.confirm-sheet.open .confirm-body{transform:translateY(0)}
.confirm-title{font-size:13px;color:var(--m2);text-align:center;padding:8px 0 16px;font-weight:500}
.confirm-ex-name{font-size:16px;font-weight:700;color:var(--t);text-align:center;margin-bottom:16px}
.confirm-del-btn{width:100%;padding:15px;background:rgba(255,85,85,.12);color:var(--red);border:1px solid rgba(255,85,85,.2);border-radius:var(--r2);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px}
.confirm-del-btn:active{background:rgba(255,85,85,.22)}
.confirm-cancel-btn{width:100%;padding:15px;background:var(--card3);color:var(--m2);border:none;border-radius:var(--r2);font-size:16px;font-weight:600;cursor:pointer}
.confirm-cancel-btn:active{background:var(--b2)}
.ex-detail-top{padding:max(48px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 0;flex-shrink:0}
.ex-detail-name{font-size:25px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.orm-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.orm-card{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--b2);border-radius:var(--r3);padding:7px 12px}
.orm-label{font-size:11px;color:var(--m2);font-weight:600;letter-spacing:.04em}
.orm-val{font-size:15px;font-weight:700;color:var(--amber)}
.orm-trend{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.orm-up{background:rgba(78,255,139,.1);color:var(--green)}.orm-dn{background:rgba(255,85,85,.1);color:var(--red)}.orm-eq{background:var(--b2);color:var(--m2)}
.target-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.target-label{font-size:12px;color:var(--m2);font-weight:500}
.target-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:30px;background:var(--acc-dim);border:1px solid rgba(212,255,78,.18);cursor:pointer}
.target-pill-text{font-size:13px;font-weight:700;color:var(--acc)}
.target-pill-edit{font-size:11px;color:rgba(212,255,78,.45)}
.target-edit-row{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.target-edit-input{width:52px;height:34px;background:var(--card2);border:1px solid var(--acc);border-radius:8px;color:var(--acc);font-size:16px;font-weight:700;text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.target-edit-input[type=number]::-webkit-inner-spin-button,.target-edit-input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.target-sep{font-size:18px;font-weight:700;color:var(--m2)}
.target-confirm{padding:7px 14px;background:var(--acc);color:#0a0a0a;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer}
.ex-detail-sub{font-size:13px;color:var(--m2);margin-bottom:14px}
/* TECH NOTES */
.tech-notes-area{margin:0 14px 12px}
.tech-notes-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--m2);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.tech-notes-tag{font-size:10px;background:rgba(255,255,255,.05);padding:2px 7px;border-radius:6px;font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--m2)}
.tech-notes-input{width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t);font-size:13px;outline:none;resize:none;min-height:64px;font-family:inherit;line-height:1.6}
.tech-notes-input::placeholder{color:var(--m)}
.tech-notes-input:focus{border-color:var(--b3)}
/* PROGRESS SUGGEST */
.prog-suggest{margin:0 14px 12px;background:rgba(212,255,78,.07);border:1px solid rgba(212,255,78,.22);border-radius:var(--r2);padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.prog-suggest-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.prog-suggest-text{font-size:13px;color:rgba(212,255,78,.9);line-height:1.5;font-weight:500}
.prog-suggest-text strong{display:block;font-size:14px;color:var(--acc);margin-bottom:2px}
.chart-wrap{margin:0 14px 12px;background:var(--card);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden}
.chart-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px}
.chart-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m2)}
.chart-tabs{display:flex;gap:4px}
.chart-tab{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--m2);transition:all .14s}
.chart-tab.active{background:var(--acc);color:#0a0a0a;border-color:var(--acc)}
canvas.prog-chart{display:block;width:100%;height:120px}
.prev-week-box{background:var(--card);border:1px solid var(--b2);border-radius:var(--r2);padding:11px 14px;margin:0 14px 12px;display:flex;align-items:flex-start;gap:10px}
.prev-week-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--m2);margin-bottom:4px}
.prev-chips{display:flex;flex-wrap:wrap;gap:5px}
.prev-chip{font-size:12px;font-weight:600;padding:3px 9px;background:var(--card2);border:1px solid var(--b2);border-radius:6px;color:var(--m2)}
.set-card{background:var(--card);border:1px solid var(--b);border-radius:var(--r2);margin:0 14px 8px;overflow:hidden}
.set-card.pr-set{border-color:rgba(255,184,78,.35)}
.set-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 8px;border-bottom:1px solid var(--b)}
.set-hdr-left{display:flex;align-items:center;gap:8px}
.set-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m2)}
.pr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:var(--amber);background:rgba(255,184,78,.1);border:1px solid rgba(255,184,78,.25);padding:2px 8px;border-radius:6px}
.set-del-btn{background:none;border:none;color:var(--m);font-size:13px;cursor:pointer;font-weight:500}
.set-body{display:flex;align-items:stretch;padding:13px 14px;gap:10px}
.set-field{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px}
.field-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m2)}
.field-controls{display:flex;align-items:center;gap:7px}

// HAPTIC - works on Android via vibrate, iOS via AudioContext impact simulation
function haptic(type){
  // Android
  try{
    if(navigator.vibrate){
      if(type==='light')navigator.vibrate(5);
      else if(type==='medium')navigator.vibrate(10);
      else if(type==='success')navigator.vibrate([6,30,6]);
      else if(type==='heavy')navigator.vibrate(18);
      else navigator.vibrate(8);
    }
  }catch(e){}
  // iOS — AudioContext click
  try{
    var ac=new (window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator();var g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    var vol=type==='light'?.03:type==='success'?.09:.05;
    var freq=type==='heavy'?55:type==='medium'?75:110;
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.00001,ac.currentTime+0.035);
    o.start(ac.currentTime);o.stop(ac.currentTime+0.035);
    setTimeout(function(){try{ac.close();}catch(e){}},100);
  }catch(e){}
}

var ANIM_DUR=380;
function goTo(id,afterFn){
  var screens=['s-main','s-day','s-ex'];
  var idx=screens.indexOf(id);
  var els=screens.map(function(s){return document.getElementById(s);});

  // Add animating class to all, then set positions
  els.forEach(function(el){el.classList.add('animating');});

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      els.forEach(function(el,i){
        el.classList.remove('slide-right','slide-left');
        if(i<idx) el.classList.add('slide-left');
        else if(i>idx) el.classList.add('slide-right');
      });
      // After animation completes, remove animating class and run callback
      setTimeout(function(){
        els.forEach(function(el){el.classList.remove('animating');});
        if(afterFn) afterFn();
      }, ANIM_DUR);
    });
  });

  // Push history state so iOS swipe-back works
  if(id!=='s-main'){
    history.pushState({screen:id},'',location.pathname);
  } else {
    history.replaceState({screen:'s-main'},'',location.pathname);
  }
}

// TODAY CARD — figure out next uncompleted session
function getNextSession(){
  // Walk through current cycle weeks + days in order, find first unsaved
  var totalCycles=numCycles();
  for(var cyc=totalCycles;cyc<=totalCycles;cyc++){
    for(var w=1;w<=4;w++){
      for(var i=0;i<getActiveDays().length;i++){
        var d=loadDay(cyc,w,getActiveDays()[i].id);
        if(!d.saved) return {cycle:cyc,week:w,cfg:getActiveDays()[i],data:d};
      }
    }
  }
  // All done — show last day
  return {cycle:totalCycles,week:4,cfg:getActiveDays()[getActiveDays().length-1],data:loadDay(totalCycles,4,getActiveDays()[getActiveDays().length-1].id),allDone:true};
}

  var isDone=data.saved||next.allDone;

  var card=document.createElement('div');
  card.className='today-card'+(isDone?' done-today':'');

  var meta=document.createElement('div');meta.className='today-meta';

function drawLineChart(canvas,pts,color){
  var W=canvas.offsetWidth||280,H=120;canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+'px';canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,W,H);
  var valid=pts.filter(function(p){return p!==null;});if(!valid.length){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('Sin datos aun',W/2,H/2);return;}
  var minV=Math.min.apply(null,valid),maxV=Math.max.apply(null,valid),range=maxV-minV||1;
  var pL=10,pR=10,pT=16,pB=22,gW=W-pL-pR,gH=H-pT-pB;
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(var gi=0;gi<=3;gi++){var gy=pT+gH*(1-gi/3);ctx.beginPath();ctx.moveTo(pL,gy);ctx.lineTo(W-pR,gy);ctx.stroke();}
  var coords=[];var xStep=pts.length>1?gW/(pts.length-1):0;
  for(var wi=0;wi<pts.length;wi++){var p=pts[wi];if(p===null)continue;coords.push({x:pL+wi*xStep,y:pT+gH*(1-(p-minV)/range),v:p,i:wi});}

function calcStreak(){var totalCycles=numCycles(),streak=0;outer:for(var cyc=totalCycles;cyc>=1;cyc--){for(var w=4;w>=1;w--){var allSaved=true;for(var i=0;i<getActiveDays().length;i++){var d=loadDay(cyc,w,getActiveDays()[i].id);if(!d.saved){allSaved=false;break;}}if(allSaved)streak++;else if(streak===0)continue;else break outer;}}return streak;}
function calcBestWeek(){var best={c:0,w:0,vol:0},totalCycles=numCycles();for(var cyc=1;cyc<=totalCycles;cyc++){for(var w=1;w<=4;w++){var wVol=0;for(var i=0;i<getActiveDays().length;i++){var d=loadDay(cyc,w,getActiveDays()[i].id);for(var j=0;j<d.exercises.length;j++)wVol+=calcVol(d.exercises[j].sets);}if(wVol>best.vol)best={c:cyc,w:w,vol:wVol};}}return best.vol>0?best:null;}

function renderBodyWeight(){
  var c=document.getElementById('bw-section');c.innerHTML='';
  var entries=loadBW().sort(function(a,b){return b.date.localeCompare(a.date);});
  var today=new Date().toISOString().slice(0,10);
  var todayEntry=entries.find(function(e){return e.date===today;});

  // LOG CARD
  var logCard=document.createElement('div');logCard.className='bw-log-card';
  var logTitle=document.createElement('div');logTitle.className='bw-log-title';
  logTitle.textContent=todayEntry?'Peso de hoy registrado':'Registrar peso de hoy';

  var bwInp=document.createElement('input');

  logRow.appendChild(bwInp);logRow.appendChild(bwUnit);logRow.appendChild(bwSave);
  logCard.appendChild(logTitle);logCard.appendChild(logRow);

  // Show delta hint if we have prev

    var last=entries[0].weight;
    var hint=document.createElement('div');

    var em=document.createElement('div');em.className='empty-hint';
    em.innerHTML='<div class="ico">⚖️</div><strong>Sin registros aún</strong>Anotá tu peso cada día para ver la evolución';
    c.appendChild(em);
    return;
  }

  // CHART
  var chartCard=document.createElement('div');chartCard.className='bw-chart-wrap';
  var chartHdr=document.createElement('div');chartHdr.className='bw-chart-header';
  var latest=entries[0].weight;
  var prev=entries.length>1?entries[1].weight:null;
  var delta=prev?Math.round((latest-prev)*10)/10:null;
  var deltaHtml=delta!==null?'<span class="bw-latest-delta '+(delta>0?'bw-delta-up':delta<0?'bw-delta-dn':'bw-delta-eq')+'">'+(delta>0?'+':'')+delta+'kg</span>':'';
  chartHdr.innerHTML='<span class="bw-chart-title">Evolución</span><div style="display:flex;align-items:baseline;gap:6px"><span class="bw-latest-val">'+latest+'kg</span>'+deltaHtml+'</div>';
  var bwCanvas=document.createElement('canvas');bwCanvas.className='bw-canvas';
  chartCard.appendChild(chartHdr);chartCard.appendChild(bwCanvas);c.appendChild(chartCard);
  setTimeout(function(){
    var sorted=loadBW().sort(function(a,b){return a.date.localeCompare(b.date);});
    drawLineChart(bwCanvas,sorted.slice(-30).map(function(e){return e.weight;}),'#4e9eff');
  },30);

    row.innerHTML='<span class="bw-entry-date">'+(isToday?'<strong style="color:var(--acc)">Hoy</strong>':parseInt(p[2])+' '+M[parseInt(p[1])-1])+'</span>'
      +'<span class="bw-entry-val">'+entry.weight+' kg</span>';
    var del=document.createElement('button');del.className='bw-entry-del';del.textContent='✕';
    del.addEventListener('click',function(){
      haptic('light');
      var arr=loadBW();

      renderBodyWeight();

    row.appendChild(del);listCard.appendChild(row);
  });
  c.appendChild(listCard);
}

// EVENTS
document.getElementById('nav-rutina').addEventListener('click',function(){haptic('light');switchNav('nav-rutina');});
document.getElementById('nav-progreso').addEventListener('click',function(){haptic('light');switchNav('nav-progreso');renderProgress();});
document.getElementById('nav-peso').addEventListener('click',function(){haptic('light');switchNav('nav-peso');renderBodyWeight();});
document.getElementById('back-to-main').addEventListener('click',function(){
  haptic('light');showSearch=false;addingExtraDay=false;
  goTo('s-main',function(){renderDayList();renderTodayCard();renderCycleDateBadge();});
});
document.getElementById('back-to-day').addEventListener('click',function(){
  haptic('light');editingTarget=false;editingName=false;
  goTo('s-day',function(){renderExList();});
});

renderCycleRow();renderWeekPills();renderDayList();renderTodayCard();
// Auto-guardar fecha de inicio del ciclo 1 si no existe
if(!localStorage.getItem('gl_cycle_start_1')){
  localStorage.setItem('gl_cycle_start_1', new Date().toISOString().slice(0,10));
}
renderCycleDateBadge();

// WELCOME SCREEN
function showWelcome(){document.getElementById('welcome-screen').classList.remove('hidden');}
function hideWelcome(user){document.getElementById('welcome-screen').classList.add('hidden');switchUser(user,true);}
document.getElementById('welcome-faq').addEventListener('click',function(){haptic('medium');hideWelcome('faq');});
document.getElementById('welcome-nov').addEventListener('click',function(){haptic('medium');hideWelcome('nov');});

// USER SWITCHER
function switchUser(user,fromWelcome){
  activeUser=user;
  localStorage.setItem('gl_active_user',user);
  curCycle=1;curWeek=1;
  document.getElementById('user-faq').classList.toggle('active',user==='faq');
  document.getElementById('user-nov').classList.toggle('active',user==='nov');
  document.getElementById('main-week-lbl').textContent='· Semana 1';
  renderCycleRow();renderWeekPills();renderDayList();renderTodayCard();renderCycleDateBadge();
}
document.getElementById('user-faq').addEventListener('click',function(){haptic('light');switchUser('faq');});
document.getElementById('user-nov').addEventListener('click',function(){haptic('light');switchUser('nov');});
document.getElementById('user-faq').classList.toggle('active',activeUser==='faq');
document.getElementById('user-nov').classList.toggle('active',activeUser==='nov');

// Show welcome screen on every open
showWelcome();
</script>
